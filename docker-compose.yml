version: '3.9'

services:
  # ─── Databases ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ptuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pulseterminal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ptuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pt_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: pt_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ptuser}:${POSTGRES_PASSWORD:-ptpassword}@postgres:5432/${POSTGRES_DB:-pulseterminal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      NODE_ENV: production
      PORT: 3001
      INTELLIGENCE_SERVICE_URL: http://intelligence:8001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - backend_logs:/app/logs

  # ─── Python Intelligence Service ─────────────────────────────────────────────
  intelligence:
    build:
      context: ./intelligence
      dockerfile: ../infra/docker/Dockerfile.intelligence
    container_name: pt_intelligence
    restart: unless-stopped
    env_file: ./intelligence/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ptuser}:${POSTGRES_PASSWORD:-ptpassword}@postgres:5432/${POSTGRES_DB:-pulseterminal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      APP_ENV: production
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    container_name: pt_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pt_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:

networks:
  default:
    name: pulseterminal_net
